<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Mudra | Premium Financial Services DSA</title>

<style>
/* SAME YOUR ORIGINAL CSS — NOT CHANGED */
:root {
--primary:#1DA1F2;--dark-bg:#0a0a0a;--secondary:#00d4ff;
--accent:#d82e2e;--light:#f6f9fc;--white:#ffffff;
--text:#425466;--shadow:0 7px 14px rgba(50,50,93,0.1),0 3px 6px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
body{background:var(--light);color:var(--text);overflow-x:hidden;}
nav{background:#fff;padding:1rem 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;font-weight:800;}
.logo-container{width:45px;height:45px;background:#f9c305;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #d82e2e;margin-right:12px;}
.hero{padding:100px 5%;background:linear-gradient(135deg,#0a0a0a,#163e64);color:#fff;text-align:center;}
.btn{padding:15px 35px;border-radius:50px;background:var(--primary);color:#fff;border:none;}
section{padding:80px 5%;}
.container-box{background:#fff;padding:40px;border-radius:20px;box-shadow:var(--shadow);}
</style>
</head>

<body>

<!-- SAME HTML STRUCTURE (NOT CHANGED) -->

<section id="emi">
<div class="container-box">
<label>Amount <span id="l-amt"></span></label>
<input type="range" id="amountRange" value="500000" oninput="runCalc()">

<label>Tenure <span id="l-ten"></span></label>
<input type="range" id="tenureRange" value="5" oninput="runCalc()">

<label>Interest <span id="l-int"></span></label>
<input type="range" id="rateRange" value="10.5" oninput="runCalc()">

<h2 id="emi-val"></h2>
<p>Total: <span id="t-val"></span></p>

<!-- ✅ STEP 1 ADDED -->
<div>
<div>Principal: <span id="principal-val"></span></div>
<div>Interest: <span id="interest-val"></span></div>
<div style="height:10px;background:#eee;">
<div id="emi-bar" style="height:100%;background:var(--primary);width:50%"></div>
</div>
</div>

</div>
</section>

<section id="eligibility">
<input id="income" placeholder="Income">
<input id="emis" placeholder="EMI">
<button onclick="checkEligibility()">Check</button>
<div id="resultBox"></div>
</section>

<section id="apply">
<form id="leadCaptureForm">
<input id="formName">
<input id="formPhone">
<select id="formType"></select>
<input id="monthlyIncome">
<input id="currentEMI">
<input id="turnover">
<select id="gstCheck"></select>
<input id="gstNumber">
<input id="formAmt">
<button type="submit" id="submitButton">Submit</button>
<div id="form-status"></div>
</form>
</section>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycby1Fnv8T2LZ7M7MTPZcoHqoDWyT6bmd7mUU1wwbWFBRZ-c_1Tv3QKdO01H_nwr5O67l4g/exec";

/* ✅ EMI PRO */
function runCalc(){
const P=parseFloat(amountRange.value);
const T=parseFloat(tenureRange.value);
const R=parseFloat(rateRange.value);

l-amt.innerText="₹"+P.toLocaleString('en-IN');
l-ten.innerText=T;
l-int.innerText=R;

const r=R/12/100;
const n=T*12;

const emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
const total=emi*n;
const interest=total-P;

emi-val.innerText="₹"+Math.round(emi).toLocaleString('en-IN');
t-val.innerText="₹"+Math.round(total).toLocaleString('en-IN');

principal-val.innerText="₹"+P.toLocaleString('en-IN');
interest-val.innerText="₹"+Math.round(interest).toLocaleString('en-IN');

emi-bar.style.width=(interest/total*100)+"%";
}

/* ✅ ELIGIBILITY PRO */
function checkEligibility(){
const income=parseFloat(income.value)||0;
const emisVal=parseFloat(emis.value)||0;

const eligibleEMI=income*0.6-emisVal;
const rate=0.11/12;
const tenure=60;

const loan=(eligibleEMI*(Math.pow(1+rate,tenure)-1))/(rate*Math.pow(1+rate,tenure));

resultBox.style.display="block";

if(eligibleEMI<=0){
resultBox.innerText="❌ Not eligible";
return;
}

resultBox.innerText="₹"+Math.round(loan).toLocaleString('en-IN');
}

/* ✅ FORM SUBMIT PRO */
leadCaptureForm.addEventListener("submit",async function(e){
e.preventDefault();

submitButton.disabled=true;
form-status.innerText="Submitting...";

const payload={
name:formName.value,
phone:formPhone.value,
loanType:formType.value,
amount:formAmt.value,
monthlyIncome:monthlyIncome.value,
currentEMI:currentEMI.value,
turnover:turnover.value,
gst:gstCheck.value,
gstNumber:gstNumber.value
};

/* ✅ LEAD SCORE */
if(payload.monthlyIncome>50000)payload.score="High";
else if(payload.monthlyIncome>25000)payload.score="Medium";
else payload.score="Low";

/* ✅ GOOGLE SHEET */
await fetch(SCRIPT_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

/* ✅ WHATSAPP */
const msg=`New Lead:
${payload.name}
${payload.phone}
₹${payload.amount}`;

window.open(`https://wa.me/919910807897?text=${encodeURIComponent(msg)}`);

form-status.innerText="✅ Submitted";
this.reset();
submitButton.disabled=false;
});

window.onload=runCalc;
</script>

</body>
</html>
